<main class="main">
  <form class="form" (ngSubmit)="onSubmit()">

    <header class="formHeader">
      <h1 class="formTitle">Asociacion de Comerciantes</h1>
      <p class="formSubtitle">Ingresa tus datos para iniciar sesion</p>
    </header>

    @if (errorMessage) {
      <div class="errorBanner">{{ errorMessage }}</div>
    }

    <div class="formItem">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="email@example.com"
        autocomplete="email"
        required
      />
    </div>

    <div class="formItem">
      <label for="contrasena">Contraseña</label>
      <input
        id="contrasena"
        type="password"
        [(ngModel)]="contrasena"
        name="contrasena"
        placeholder="••••••••"
        autocomplete="current-password"
        required
      />
    </div>

    <button type="submit" [disabled]="isLoading" class="btn">
      @if (isLoading) {
        Iniciando sesion…
      } @else {
        Iniciar sesion
      }
    </button>

  </form>
</main>
